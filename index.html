<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RapidCAM — Free Browser-Based CAD/CAM for Desktop CNC</title>
    <meta
      name="description"
      content="RapidCAM is a free, open-source CAD/CAM app that runs in your browser. Sketch parts, apply parametric constraints, generate toolpaths, and export GRBL or LinuxCNC G-code — no install, no account, no upload."
    />
    <meta name="author" content="RapidCAM" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://rapidcam.app" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rapidcam.app" />
    <meta property="og:title" content="RapidCAM — Free Browser-Based CAD/CAM for Desktop CNC" />
    <meta
      property="og:description"
      content="Sketch parts, apply parametric constraints, generate toolpaths, and export G-code — all in your browser. No install, no account, no upload."
    />
    <meta property="og:image" content="https://rapidcam.app/rapidcam-og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="RapidCAM — open-source CAD/CAM in the browser" />
    <meta property="og:site_name" content="RapidCAM" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://rapidcam.app" />
    <meta name="twitter:title" content="RapidCAM — Free Browser-Based CAD/CAM for Desktop CNC" />
    <meta
      name="twitter:description"
      content="Sketch parts, apply parametric constraints, generate toolpaths, and export G-code — all in your browser. No install, no account, no upload."
    />
    <meta name="twitter:image" content="https://rapidcam.app/rapidcam-og.png" />
    <meta name="twitter:image:alt" content="RapidCAM — open-source CAD/CAM in the browser" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="theme-color" content="#0F6E56" />
  </head>
  <body>
    <div id="app">
      <header id="topbar"></header>
      <div id="constraintbar"></div>
      <div id="workspace">
        <aside id="toolpalette"></aside>
        <div id="main-area">
          <main id="canvas-host">
            <canvas id="scene"></canvas>
          </main>
          <div id="split-divider" class="hidden"></div>
          <div id="webgl-host" class="hidden"></div>
        </div>
        <div id="right-panel">
          <div id="right-tabs">
            <button class="rtab active" data-tab="draw">Draw</button>
            <button class="rtab" data-tab="cam">CAM</button>
          </div>
          <div class="rtab-content active" data-panel="draw">
            <aside id="propertiesbar"></aside>
            <aside id="variablesbar"></aside>
            <aside id="layersbar"></aside>
          </div>
          <div class="rtab-content" data-panel="cam">
            <aside id="settingsbar"></aside>
            <aside id="cambar"></aside>
          </div>
        </div>
      </div>
      <footer id="statusbar"></footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
